<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação Diária de Recrutas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Barlow:wght@300;400;500;600&display=swap');
:root {
  --bg:#0e1a0e; --surface:#162416; --surface2:#1e321e;
  --border:#2a4a2a; --green-deep:#1a2e1a; --green-mid:#2d4a2d;
  --green-accent:#5a9e5a; --green-glow:#7ec87e;
  --khaki:#c8b87a; --khaki-light:#e0d098;
  --text:#d4e8d4; --text-muted:#7a9e7a;
  --red:#c0392b; --red-light:#e74c3c;
  --yellow:#d4a017; --yellow-light:#f0c040;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}

/* HEADER */
header{background:var(--green-deep);border-bottom:2px solid var(--khaki);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:12px;}
.crest{width:44px;height:44px;border:2px solid var(--khaki);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;}
.header-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--khaki-light);}
.header-sub{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:12px;}
.week-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:5px 10px;}
.week-box label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;}
.week-box input{background:none;border:none;color:var(--khaki-light);font-family:'JetBrains Mono',monospace;font-size:0.8rem;outline:none;color-scheme:dark;width:130px;}
#syncStatus{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);min-width:80px;text-align:right;}

/* MAIN */
main{padding:20px 24px;max-width:1100px;margin:0 auto;}

/* SECTION CARD */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:20px;}
.section-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--khaki-light);padding-bottom:12px;margin-bottom:16px;border-bottom:1px solid var(--border);}

/* DATE BAR */
.date-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.date-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:6px 12px;}
.date-box label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;}
.date-box input{background:none;border:none;color:var(--khaki-light);font-family:'JetBrains Mono',monospace;font-size:0.8rem;outline:none;color-scheme:dark;}
.btn{border:none;border-radius:4px;cursor:pointer;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.btn-primary{background:var(--green-mid);border:1px solid var(--green-accent);color:var(--green-glow);padding:7px 16px;font-size:0.78rem;}
.btn-save{background:var(--khaki);color:var(--green-deep);padding:8px 22px;font-size:0.82rem;}
.btn:hover{opacity:0.85;}

/* RECRUTA CARD */
.recruta-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:8px;}
.recruta-card:last-child{margin-bottom:0;}
.card-row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.rank-badge{font-family:'Oswald',sans-serif;font-weight:700;font-size:1rem;min-width:42px;text-align:center;flex-shrink:0;}
.recruta-name{font-family:'Oswald',sans-serif;font-weight:700;font-size:0.98rem;letter-spacing:0.04em;color:var(--khaki-light);min-width:130px;flex:1;}
.fo-group{display:flex;flex-direction:column;align-items:center;gap:3px;}
.fo-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;}
.fo-label.pos{color:var(--green-glow);}
.fo-label.neg{color:var(--red-light);}
.fo-label.aval{color:var(--text-muted);}
select.fo-sel{background:#0a1e0a!important;border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.75rem;padding:4px 6px;outline:none;cursor:pointer;color-scheme:dark;-webkit-appearance:none;appearance:none;}
select.fo-sel.pos{border-color:#2a5a2a;color:var(--green-glow);}
select.fo-sel.neg{border-color:#5a2a2a;color:var(--red-light);}
select.fo-sel.aval{border-color:var(--border);color:var(--khaki-light);width:120px;}
.card-row2{margin-top:8px;}
.obs-inp{width:100%;background:var(--surface)!important;border:1px solid var(--border);border-radius:3px;color:var(--text-muted);font-family:'Barlow',sans-serif;font-size:0.8rem;padding:5px 10px;outline:none;box-sizing:border-box;color-scheme:dark;}
.obs-inp:focus{border-color:var(--green-accent);color:var(--text);}
.obs-inp::placeholder{color:#3d6b3d;}

/* HISTORICO TABLE */
.hist-table{width:100%;border-collapse:collapse;font-size:0.85rem;}
.hist-table th{padding:8px 14px;font-family:'Oswald',sans-serif;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;background:var(--green-deep);border-bottom:1px solid var(--border);}
.hist-table td{padding:9px 14px;border-bottom:1px solid var(--border);}
.hist-table tr:last-child td{border-bottom:none;}
.hist-table tr:hover td{background:var(--surface2);}
.badge{display:inline-block;padding:3px 12px;border-radius:3px;font-family:'Oswald',sans-serif;font-weight:700;font-size:0.95rem;}
.badge-pos{background:rgba(94,206,94,0.1);border:1px solid #3d6b3d;color:var(--green-glow);}
.badge-neg{background:rgba(231,76,60,0.1);border:1px solid #5a1a1a;color:var(--red-light);}

/* MISSÕES */
.miss-table{width:100%;border-collapse:collapse;font-size:0.85rem;}
.miss-table th{padding:9px 14px;font-family:'Oswald',sans-serif;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;background:var(--green-deep);border-bottom:1px solid var(--border);color:var(--khaki-light);}
.miss-table td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.miss-table tr:last-child td{border-bottom:none;}
.miss-table tr:hover td{background:var(--surface2);}
.miss-inp{background:var(--surface)!important;border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Barlow',sans-serif;font-size:0.82rem;padding:4px 8px;outline:none;color-scheme:dark;width:100%;}
.miss-inp:focus{border-color:var(--green-accent);}
.miss-sel{background:#0a1e0a!important;border:1px solid var(--border);border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;padding:4px 6px;outline:none;cursor:pointer;color-scheme:dark;-webkit-appearance:none;appearance:none;}
.status-badge{display:inline-block;padding:3px 10px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:0.68rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;}
.s-pendente{background:rgba(212,160,23,0.12);border:1px solid var(--yellow);color:var(--yellow-light);}
.s-andamento{background:rgba(94,158,94,0.12);border:1px solid var(--green-accent);color:var(--green-glow);}
.s-concluida{background:rgba(100,100,200,0.12);border:1px solid #5a5aaa;color:#aaaaee;}
.s-cancelada{background:rgba(192,57,43,0.12);border:1px solid var(--red);color:var(--red-light);}
.btn-del{background:none;border:1px solid #3a1a1a;border-radius:3px;color:#7a3a3a;font-size:0.75rem;padding:3px 8px;cursor:pointer;transition:all 0.15s;}
.btn-del:hover{background:#3a1a1a;color:var(--red-light);}

/* TOAST */
#savedToast{position:fixed;bottom:24px;right:24px;background:var(--green-mid);border:1px solid var(--green-accent);color:var(--green-glow);font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.06em;text-transform:uppercase;padding:8px 18px;border-radius:4px;opacity:0;transform:translateY(8px);transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:9999;}
#savedToast.show{opacity:1;transform:translateY(0);}

@media(max-width:700px){
  header{flex-direction:column;height:auto;padding:10px 16px;gap:8px;}
  main{padding:12px;}
  .card-row1{gap:8px;}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="crest">⚔️</div>
    <div>
      <div class="header-title">Avaliação Diária de Recrutas</div>
      <div class="header-sub">Sistema de Acompanhamento — EB</div>
    </div>
  </div>
  <div class="header-right">
    <div class="week-box">
      <label>Semana:</label>
      <input type="week" id="weekPicker">
    </div>
    <span id="syncStatus"></span>
  </div>
</header>

<main>

  <!-- AVALIAÇÃO DIÁRIA -->
  <div class="section-card">
    <div class="section-title">📅 Avaliação Diária — FO+ / FO-</div>

    <div class="date-bar">
      <div class="date-box">
        <label>Data:</label>
        <input type="date" id="dailyDate">
      </div>
      <button class="btn btn-primary" onclick="loadDailyData()">↺ Carregar data</button>
      <button class="btn btn-save" onclick="saveDailyAll()">💾 Salvar avaliação</button>
    </div>

    <div id="dailyGrid"></div>
  </div>

  <!-- HISTÓRICO -->
  <div class="section-card">
    <div class="section-title">📈 Histórico Acumulado — FO+ / FO- da Semana</div>
    <div style="overflow-x:auto;">
      <table class="hist-table">
        <thead>
          <tr>
            <th style="text-align:center;width:50px;">#</th>
            <th style="text-align:left;">Recruta</th>
            <th style="text-align:center;color:var(--green-glow);">Total FO+</th>
            <th style="text-align:center;color:var(--red-light);">Total FO-</th>
            <th style="text-align:center;color:var(--khaki-light);">Saldo</th>
          </tr>
        </thead>
        <tbody id="historicoBody"></tbody>
      </table>
    </div>
  </div>


  <!-- MISSÕES -->
  <div class="section-card">
    <div class="section-title">🎯 Tabela de Missões</div>

    <!-- Add mission form -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end;">
      <div style="display:flex;flex-direction:column;gap:4px;flex:2;min-width:160px;">
        <label style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Nome da Missão</label>
        <input type="text" id="missNome" class="miss-inp" placeholder="Ex: Patrulha Setor Norte..." maxlength="80">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <label style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Data</label>
        <input type="date" id="missData" class="miss-inp" style="width:140px;color-scheme:dark;">
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;min-width:140px;">
        <label style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Responsável</label>
        <select id="missResponsavel" class="miss-sel" style="width:140px;color:var(--khaki-light);">
          <option value="">— Selecionar —</option>
          <option>Ten Farias</option>
          <option>Sgt Leão</option>
          <option>Cb Muniz</option>
          <option>Cb Guilherme</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <label style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;">Status</label>
        <select id="missStatus" class="miss-sel" style="width:130px;color:var(--yellow-light);">
          <option value="pendente">⏳ Pendente</option>
          <option value="andamento">🔄 Em andamento</option>
          <option value="concluida">✅ Concluída</option>
          <option value="cancelada">❌ Cancelada</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="addMission()" style="align-self:flex-end;">+ Adicionar</button>
    </div>

    <!-- Table -->
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:4px;">
      <table class="miss-table">
        <thead>
          <tr>
            <th style="text-align:left;min-width:200px;">Nome da Missão</th>
            <th style="text-align:center;min-width:110px;">Data</th>
            <th style="text-align:center;min-width:130px;">Responsável</th>
            <th style="text-align:center;min-width:130px;">Status</th>
            <th style="text-align:center;width:50px;"></th>
          </tr>
        </thead>
        <tbody id="missaoBody"></tbody>
      </table>
    </div>
    <div id="missaoEmpty" style="text-align:center;padding:24px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-muted);display:none;">Nenhuma missão registrada</div>
  </div>

</main>

<div id="savedToast">✔ Salvo</div>

<script>
// ── DADOS ──────────────────────────────────────────────
const RECRUTAS = [
  "Sd Petherson","Sd Custodio","Sd Greco","Sd Trindade",
  "Sd Azevedo","Sd Lopes","Sd Fernandes","Sd G. Moraes",
  "Sd Queiroz","Sd Isidorio","Sd Sacramento","Sd Dornellas",
  "Sd Kaio","Sd Evandro","Sd L. Pereira","Sd Jotta","Sd Mateus Reis"
];
const AVALIADORES = ["Ten Farias","Sgt Leão","Cb Muniz","Cb Guilherme"];

// ── SUPABASE ────────────────────────────────────────────
const SUPABASE_URL = 'https://ebltwbihorfmvjdzzgax.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVibHR3Ymlob3JmbXZqZHp6Z2F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDIxOTksImV4cCI6MjA5Nzk3ODE5OX0.WZ_1ldwCmiqAygAU6KhkZzgJ-OYzGphOHJNnAKknp_Q';

async function sbFetch(path, options = {}) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
  };
  if (options.prefer) headers['Prefer'] = options.prefer;
  const url = SUPABASE_URL + '/rest/v1/' + path;
  try {
    const res = await fetch(url, {
      method: options.method || 'GET',
      headers,
      body: options.body || undefined
    });
    return res;
  } catch(e) {
    console.error('sbFetch error:', url, e.message);
    // Mostra erro visível na tela
    showStatus('⚠ ' + e.message + ' | URL: ' + SUPABASE_URL);
    throw e;
  }
}

// ── CACHE ───────────────────────────────────────────────
// historicoCache[recruta] = { pos: N, neg: N }
// dailyCache[recruta] = { fo_pos, fo_neg, avaliado_por, obs_diaria }
let historicoCache = {};
let dailyCache = {};

function initHistoricoCache() {
  historicoCache = {};
  RECRUTAS.forEach(n => { historicoCache[n] = { pos: 0, neg: 0 }; });
}

// ── RANKING ─────────────────────────────────────────────
function getRankedRecrulas() {
  return RECRUTAS.slice().sort((a, b) => {
    const sA = (historicoCache[a]||{pos:0,neg:0});
    const sB = (historicoCache[b]||{pos:0,neg:0});
    return (sB.pos - sB.neg) - (sA.pos - sA.neg);
  });
}

// ── BUILD GRID ──────────────────────────────────────────
function buildDailyGrid() {
  const grid = document.getElementById('dailyGrid');
  grid.innerHTML = '';
  const ranked = getRankedRecrulas();

  ranked.forEach((name, idx) => {
    const rank = idx + 1;
    const saved = dailyCache[name] || {};
    const rankColor = rank === 1 ? '#f0c040' : rank === 2 ? '#c0c0c0' : rank === 3 ? '#cd7f32' : 'var(--text-muted)';
    const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank + 'º';

    const card = document.createElement('div');
    card.className = 'recruta-card';
    card.dataset.name = name;

    // Row 1: rank + name + fo+ + fo- + avaliador
    const row1 = document.createElement('div');
    row1.className = 'card-row1';

    // Name
    const nameEl = document.createElement('div');
    nameEl.className = 'recruta-name';
    nameEl.textContent = name;
    row1.appendChild(nameEl);

    // FO+
    const foPosGroup = document.createElement('div');
    foPosGroup.className = 'fo-group';
    const foPosLabel = document.createElement('div');
    foPosLabel.className = 'fo-label pos';
    foPosLabel.textContent = 'FO+';
    const selPos = document.createElement('select');
    selPos.className = 'fo-sel pos';
    selPos.dataset.type = 'fo_pos';
    selPos.style.width = '68px';
    ['—','FO+'].forEach(v => {
      const o = document.createElement('option');
      o.value = v === '—' ? '' : v;
      o.textContent = v;
      selPos.appendChild(o);
    });
    selPos.value = '';
    foPosGroup.appendChild(foPosLabel);
    foPosGroup.appendChild(selPos);
    row1.appendChild(foPosGroup);

    // FO-
    const foNegGroup = document.createElement('div');
    foNegGroup.className = 'fo-group';
    const foNegLabel = document.createElement('div');
    foNegLabel.className = 'fo-label neg';
    foNegLabel.textContent = 'FO-';
    const selNeg = document.createElement('select');
    selNeg.className = 'fo-sel neg';
    selNeg.dataset.type = 'fo_neg';
    selNeg.style.width = '68px';
    ['—','FO-'].forEach(v => {
      const o = document.createElement('option');
      o.value = v === '—' ? '' : v;
      o.textContent = v;
      selNeg.appendChild(o);
    });
    selNeg.value = '';
    foNegGroup.appendChild(foNegLabel);
    foNegGroup.appendChild(selNeg);
    row1.appendChild(foNegGroup);

    // Avaliador
    const avalGroup = document.createElement('div');
    avalGroup.className = 'fo-group';
    const avalLabel = document.createElement('div');
    avalLabel.className = 'fo-label aval';
    avalLabel.textContent = 'Avaliador';
    const selAv = document.createElement('select');
    selAv.className = 'fo-sel aval';
    selAv.dataset.type = 'avaliador';
    ['— Selecionar —', ...AVALIADORES].forEach(v => {
      const o = document.createElement('option');
      o.value = v === '— Selecionar —' ? '' : v;
      o.textContent = v;
      if ((saved.avaliado_por || '') === o.value) o.selected = true;
      selAv.appendChild(o);
    });
    avalGroup.appendChild(avalLabel);
    avalGroup.appendChild(selAv);
    row1.appendChild(avalGroup);

    card.appendChild(row1);

    // Row 2: observação
    const row2 = document.createElement('div');
    row2.className = 'card-row2';
    const obs = document.createElement('input');
    obs.type = 'text';
    obs.className = 'obs-inp';
    obs.placeholder = '✏ Observação do dia...';
    obs.maxLength = 120;
    obs.value = saved.obs_diaria || '';
    row2.appendChild(obs);
    card.appendChild(row2);

    grid.appendChild(card);
  });
}

// ── LOAD DIÁRIO (por data) ──────────────────────────────
// dailyCache guarda os dados do dia selecionado (para preencher o grid)
// O histórico acumulado vive em historicoCache e não é afetado pela troca de data

async function loadDailyData() {
  const d = document.getElementById('dailyDate').value;
  const w = document.getElementById('weekPicker').value || 'default';
  if (!d) { dailyCache = {}; buildDailyGrid(); return; }

  showStatus('carregando...');
  try {
    const res = await sbFetch(
      `avaliacoes_diarias?semana=eq.${encodeURIComponent(w)}&data=eq.${encodeURIComponent(d)}&select=recruta,fo_pos,fo_neg,avaliado_por,obs_diaria`
    );
    const rows = await res.json();
    // Reseta só o cache do dia — histórico permanece intacto
    dailyCache = {};
    if (Array.isArray(rows)) {
      rows.forEach(r => { dailyCache[r.recruta] = r; });
    }
    showStatus('');
  } catch(e) {
    dailyCache = {};
    showStatus('⚠ sem conexão');
  }
  // Reconstrói o grid com os dados do dia selecionado
  // O ranking continua baseado no histórico acumulado (historicoCache)
  buildDailyGrid();
}

// ── LOAD HISTÓRICO (semana inteira) ─────────────────────
// detailCache[recruta] = [ {data, fo_pos, fo_neg, avaliado_por, obs_diaria}, ... ]
let detailCache = {};

async function loadHistorico() {
  const w = document.getElementById('weekPicker').value || 'default';
  initHistoricoCache();
  detailCache = {};
  try {
    const res = await sbFetch(
      `avaliacoes_diarias?semana=eq.${encodeURIComponent(w)}&select=recruta,fo_pos,fo_neg,avaliado_por,obs_diaria,data&order=data.asc`
    );
    const rows = await res.json();
    if (Array.isArray(rows)) {
      rows.forEach(r => {
        if (!historicoCache[r.recruta]) return;
        if (r.fo_pos === 'FO+') historicoCache[r.recruta].pos++;
        if (r.fo_neg === 'FO-') historicoCache[r.recruta].neg++;
        // store detail
        if (!detailCache[r.recruta]) detailCache[r.recruta] = [];
        if (r.fo_pos === 'FO+' || r.fo_neg === 'FO-') {
          detailCache[r.recruta].push(r);
        }
      });
    }
  } catch(e) {
    console.error('Erro histórico:', e);
  }
  buildHistoricoTable();
  buildDailyGrid(); // atualiza ranking
}

// ── BUILD HISTÓRICO TABLE ───────────────────────────────
function buildHistoricoTable() {
  const tbody = document.getElementById('historicoBody');
  tbody.innerHTML = '';
  const ranked = getRankedRecrulas();
  ranked.forEach((name, idx) => {
    const t = historicoCache[name] || { pos: 0, neg: 0 };
    const saldo = t.pos - t.neg;
    const saldoColor = saldo > 0 ? 'var(--green-glow)' : saldo < 0 ? 'var(--red-light)' : 'var(--text-muted)';
    const rank = idx + 1;
    const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank + 'º';
    const details = detailCache[name] || [];

    const tr = document.createElement('tr');
    tr.style.cursor = details.length > 0 ? 'pointer' : 'default';
    tr.innerHTML = `
      <td style="text-align:center;font-family:'Oswald',sans-serif;font-weight:700;color:${rank<=3?saldoColor:'var(--text-muted)'};">${rankIcon}</td>
      <td style="font-family:'Oswald',sans-serif;font-weight:600;color:var(--khaki-light);">${name}${details.length > 0 ? ' <span style="font-size:0.65rem;color:var(--text-muted);font-family:JetBrains Mono,monospace;">ℹ</span>' : ''}</td>
      <td style="text-align:center;"><span class="badge badge-pos">${t.pos}</span></td>
      <td style="text-align:center;"><span class="badge badge-neg">${t.neg}</span></td>
      <td style="text-align:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:1rem;color:${saldoColor};">${saldo > 0 ? '+' : ''}${saldo}</td>
    `;

    // Detail row (hidden by default)
    const trDetail = document.createElement('tr');
    trDetail.style.display = 'none';
    const tdDetail = document.createElement('td');
    tdDetail.colSpan = 5;
    tdDetail.style.cssText = 'padding:0 14px 12px 14px; background:var(--surface2);';

    if (details.length > 0) {
      let html = '<div style="display:flex;flex-direction:column;gap:6px;padding-top:8px;">';
      details.forEach(d => {
        const tipo = d.fo_pos === 'FO+' ? '<span style="color:var(--green-glow);font-weight:700;">FO+</span>' : '<span style="color:var(--red-light);font-weight:700;">FO-</span>';
        const aval = d.avaliado_por ? `<span style="color:var(--khaki-light);">${d.avaliado_por}</span>` : '<span style="color:var(--text-muted);">—</span>';
        const obs  = d.obs_diaria  ? `<span style="color:var(--text-muted);">"${d.obs_diaria}"</span>` : '';
        html += `<div style="display:flex;align-items:center;gap:10px;font-family:Barlow,sans-serif;font-size:0.82rem;border-left:2px solid var(--border);padding-left:10px;">
          <span style="font-family:JetBrains Mono,monospace;font-size:0.7rem;color:var(--text-muted);min-width:80px;">${d.data}</span>
          ${tipo}
          <span style="color:var(--text-muted);">por</span>
          ${aval}
          ${obs}
        </div>`;
      });
      html += '</div>';
      tdDetail.innerHTML = html;
    }

    trDetail.appendChild(tdDetail);

    // Toggle on click
    if (details.length > 0) {
      tr.addEventListener('click', () => {
        const isOpen = trDetail.style.display !== 'none';
        trDetail.style.display = isOpen ? 'none' : 'table-row';
        tr.style.background = isOpen ? '' : 'var(--surface2)';
      });
      // Also show on hover
      tr.addEventListener('mouseenter', () => { tr.style.background = 'var(--surface2)'; });
      tr.addEventListener('mouseleave', () => {
        if (trDetail.style.display === 'none') tr.style.background = '';
      });
    }

    tbody.appendChild(tr);
    tbody.appendChild(trDetail);
  });
}

// ── SALVAR ──────────────────────────────────────────────
async function saveDailyAll() {
  const d = document.getElementById('dailyDate').value;
  const w = document.getElementById('weekPicker').value || 'default';
  if (!d) { alert('Selecione uma data primeiro.'); return; }

  const grid = document.getElementById('dailyGrid');
  const rows = [];

  Array.from(grid.children).forEach(card => {
    const name = card.dataset.name;
    // Select FO+ e FO- pelos data-type
    const selPos = card.querySelector('select[data-type="fo_pos"]');
    const selNeg = card.querySelector('select[data-type="fo_neg"]');
    const selAv  = card.querySelector('select[data-type="avaliador"]');
    const inp    = card.querySelector('input.obs-inp');
    const row = {
      semana: w, data: d, recruta: name,
      fo_pos: selPos ? selPos.value : '',
      fo_neg: selNeg ? selNeg.value : '',
      avaliado_por: selAv ? selAv.value : '',
      obs_diaria: inp ? inp.value : '',
      updated_at: new Date().toISOString()
    };
    rows.push(row);
  });

  // Filtra só quem tem algo preenchido (não salva linhas completamente vazias)
  const rowsToSave = rows.filter(r => r.fo_pos || r.fo_neg || r.avaliado_por || r.obs_diaria);

  if (rowsToSave.length === 0) {
    alert('Nenhum campo preenchido para salvar.');
    return;
  }

  showStatus('salvando...');
  try {
    const res = await sbFetch('avaliacoes_diarias', {
      method: 'POST',
      prefer: 'return=minimal,resolution=merge-duplicates',
      body: JSON.stringify(rowsToSave)
    });

    if (!res.ok) {
      const err = await res.text();
      console.error('Erro Supabase:', err);
      showStatus('⚠ erro: ' + res.status);
      return;
    }

    showToast();
    showStatus('');

    // Resetar FO+ e FO-
    Array.from(grid.children).forEach(card => {
      const selPos = card.querySelector('select[data-type="fo_pos"]');
      const selNeg = card.querySelector('select[data-type="fo_neg"]');
      if (selPos) selPos.value = '';
      if (selNeg) selNeg.value = '';
    });

    // Recarregar histórico e ranking
    await loadHistorico();

  } catch(e) {
    console.error(e);
    showStatus('⚠ erro ao salvar');
  }
}

// ── UI HELPERS ──────────────────────────────────────────
function showStatus(msg) {
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = msg;
}

function showToast() {
  const t = document.getElementById('savedToast');
  if (!t) return;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── MISSÕES ─────────────────────────────────────────────
let missions = []; // { id, nome, data, responsavel, status }

async function loadMissions() {
  const w = document.getElementById('weekPicker').value || 'default';
  try {
    const res = await sbFetch(`missoes?semana=eq.${encodeURIComponent(w)}&select=id,nome,data,responsavel,status&order=data.asc`);
    if (!res.ok) {
      const errText = await res.text();
      console.error('loadMissions error:', res.status, errText);
      missions = []; buildMissaoTable(); return;
    }
    const rows = await res.json();
    missions = Array.isArray(rows) ? rows : [];
  } catch(e) {
    console.warn('Missoes fetch error:', e.message);
    missions = [];
  }
  buildMissaoTable();
}

async function addMission() {
  const nome = document.getElementById('missNome').value.trim();
  const data = document.getElementById('missData').value;
  const resp = document.getElementById('missResponsavel').value;
  const status = document.getElementById('missStatus').value;
  const w = document.getElementById('weekPicker').value || 'default';
  if (!nome) { alert('Informe o nome da missão.'); return; }

  const row = { semana: w, nome, data, responsavel: resp, status };
  try {
    const res = await sbFetch('missoes', {
      method: 'POST',
      prefer: 'return=minimal',
      body: JSON.stringify(row)
    });
    if (!res.ok) {
      const errText = await res.text();
      console.error('Erro ao salvar missão:', res.status, errText);
      // Se 404, tenta sem semana para debug
      if (res.status === 404) {
        showStatus('⚠ tabela não encontrada (404)');
      } else {
        showStatus('⚠ erro: ' + res.status + ' — ' + errText.slice(0,60));
      }
      return;
    }
    await loadMissions();
    document.getElementById('missNome').value = '';
    document.getElementById('missData').value = '';
    showToast();
  } catch(e) {
    console.error(e);
    showStatus('⚠ erro ao salvar missão');
  }
}

async function updateMissionStatus(id, status) {
  try {
    await sbFetch(`missoes?id=eq.${id}`, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: JSON.stringify({ status })
    });
    const m = missions.find(m => m.id === id);
    if (m) m.status = status;
    buildMissaoTable();
  } catch(e) {}
}

async function deleteMission(id) {
  if (!confirm('Remover esta missão?')) return;
  try {
    await sbFetch(`missoes?id=eq.${id}`, { method: 'DELETE' });
    missions = missions.filter(m => m.id !== id);
    buildMissaoTable();
  } catch(e) {}
}

function buildMissaoTable() {
  const tbody = document.getElementById('missaoBody');
  const empty = document.getElementById('missaoEmpty');
  tbody.innerHTML = '';
  if (!missions.length) { empty.style.display='block'; return; }
  empty.style.display = 'none';

  const statusMap = {
    pendente:  { label:'⏳ Pendente',     cls:'s-pendente' },
    andamento: { label:'🔄 Em andamento', cls:'s-andamento' },
    concluida: { label:'✅ Concluída',    cls:'s-concluida' },
    cancelada: { label:'❌ Cancelada',    cls:'s-cancelada' }
  };

  missions.forEach(m => {
    const s = statusMap[m.status] || statusMap['pendente'];
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-family:'Barlow',sans-serif;font-weight:500;color:var(--text);">${m.nome}</td>
      <td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--text-muted);">${m.data || '—'}</td>
      <td style="text-align:center;font-family:'Oswald',sans-serif;font-weight:600;color:var(--khaki-light);">${m.responsavel || '—'}</td>
      <td style="text-align:center;"></td>
      <td style="text-align:center;"><button class="btn-del" onclick="deleteMission(${m.id})">✕</button></td>
    `;
    // Status select in td[3]
    const tdStatus = tr.children[3];
    const sel = document.createElement('select');
    sel.className = 'miss-sel';
    sel.style.cssText = 'width:130px;';
    Object.entries(statusMap).forEach(([val, opt]) => {
      const o = document.createElement('option');
      o.value = val; o.textContent = opt.label;
      if (val === m.status) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => updateMissionStatus(m.id, sel.value));
    const badge = document.createElement('span');
    badge.className = `status-badge ${s.cls}`;
    badge.textContent = s.label;
    tdStatus.appendChild(sel);
    tbody.appendChild(tr);
  });
}

// ── AUTO AVANÇA O DIA ──────────────────────────────────
function getTodayStr() {
  return new Date().toISOString().split('T')[0];
}

function checkDayChange() {
  const picker = document.getElementById('dailyDate');
  const today = getTodayStr();
  if (picker && picker.value !== today) {
    picker.value = today;
    loadDailyData(); // carrega FOs do novo dia (começa vazio, histórico acumulado permanece)
  }
}

// ── INIT ────────────────────────────────────────────────
(function init() {
  // Set week
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const week = Math.ceil((((now - jan1) / 86400000) + jan1.getDay() + 1) / 7);
  document.getElementById('weekPicker').value =
    `${now.getFullYear()}-W${String(week).padStart(2,'0')}`;

  // Set today
  document.getElementById('dailyDate').value = getTodayStr();

  // Draw empty grid immediately
  initHistoricoCache();
  buildDailyGrid();
  buildHistoricoTable();

  // Load data from Supabase (histórico acumula, daily carrega o dia atual)
  loadHistorico().then(() => loadDailyData());
  loadMissions();

  // On week change: reload everything
  document.getElementById('weekPicker').addEventListener('change', () => {
    loadHistorico().then(() => loadDailyData());
  loadMissions();
  });

  // On date change: load that specific day's data (histórico não muda)
  document.getElementById('dailyDate').addEventListener('change', loadDailyData);

  // Verifica a cada minuto se virou o dia e avança automaticamente
  setInterval(checkDayChange, 60 * 1000);
})();
</script>
